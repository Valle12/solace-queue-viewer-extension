name: Test

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Run unit tests
        run: bun test

      - name: Install playwright browser
        run: bunx playwright install

      - name: Run e2e tests
        run: bun run e2e
